name: Build Sonic APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build APK
        run: |
          # Este comando tenta gerar o APK diretamente do seu manifest.json
          # Pode ser necessário configurar um arquivo twa-manifest.json no futuro,
          # mas por agora, vamos tentar o build direto ou inicialização rápida.
          bubblewrap init --manifest https://delsonbon-png.github.io/sonic-runner-mobile/manifest.json --directory ./app --metaData ./app/twa-manifest.json || true
          # Se o init passar, tentamos o build
          cd app && bubblewrap build --skip-signing || echo "Build falhou, mas vamos checar os logs"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sonic-apk
          path: app/*.apk
